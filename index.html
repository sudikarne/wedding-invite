<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation - Sudishna & Vikash</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
  body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    overflow: hidden;
    font-family: 'Playfair Display', serif;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #c2185b; /* dark pink */
  }

  .slide1 {
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100%;
    width: 100%;
    text-align: center;
    background: url('background-1.jpg') no-repeat center center/cover;
  }

  h1 {
    font-family: 'Great Vibes', cursive;
    font-size: 2em;
    z-index: 2;
    position: relative;
    letter-spacing: 1.5px;
    margin: 0;
  }

  /* Elegant spacing */
  h1:nth-child(1) { margin-bottom: 1em; }
  h1:nth-child(2) { margin-bottom: 0.5em; }

  /* Floating petals */
  .petal {
    position: fixed;
    top: -50px;
    font-size: 20px;
    animation: fall linear infinite;
    opacity: 0.7;
    z-index: 1;
    pointer-events: none;
  }

  @keyframes fall {
    0% {
      transform: translateY(0) translateX(0) rotate(0deg);
    }
    100% {
      transform: translateY(110vh) translateX(80px) rotate(360deg);
    }
  }
</style>
</head>

<body>

<div class="slide1">
  <h1>Wedding Invitation</h1>
  <h1>Sudishna</h1>
  <h1>Vikash</h1>
</div>

<!-- Petals -->
<div class="petal" style="left:5%; animation-duration:10s;">🌸</div>
<div class="petal" style="left:15%; animation-duration:12s;">🌸</div>
<div class="petal" style="left:25%; animation-duration:14s;">🌸</div>
<div class="petal" style="left:35%; animation-duration:9s;">🌸</div>
<div class="petal" style="left:50%; animation-duration:11s;">🌸</div>
<div class="petal" style="left:65%; animation-duration:13s;">🌸</div>
<div class="petal" style="left:75%; animation-duration:15s;">🌸</div>
<div class="petal" style="left:85%; animation-duration:10s;">🌸</div>
<div class="petal" style="left:95%; animation-duration:12s;">🌸</div>

</body>
</html>
