<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation - Sudishna & Vikash</title>
<!-- Google Fonts for elegant text -->
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0;
    padding: 0;
    height: 100vh;
    width: 100vw;
    overflow: hidden;
    background: #d4f1dc; /* pastel green background */
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Playfair Display', serif;
    color: #f7c8d1; /* pastel pink ink for text */
    text-align: center;
    position: relative;
  }

  h1 {
    font-family: 'Great Vibes', cursive;
    font-size: 3em;
    letter-spacing: 2px;
    z-index: 2;
  }

  /* Flower animation */
  .flower {
    position: absolute;
    width: 50px;
    height: 50px;
    background-image: url('https://i.ibb.co/k9LfBwp/pink-flower.png'); /* sample pink flower */
    background-size: cover;
    top: -10%;
    animation: float 10s linear infinite;
  }

  @keyframes float {
    0% { transform: translateX(0) translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateX(100vw) translateY(100vh) rotate(360deg); opacity: 0; }
  }
</style>
</head>
<body>

<h1>Wedding Invitation of<br>Sudishna & Vikash</h1>

<!-- Multiple flowers -->
<div class="flower" style="left: 10%; animation-duration: 12s;"></div>
<div class="flower" style="left: 30%; animation-duration: 15s;"></div>
<div class="flower" style="left: 50%; animation-duration: 10s;"></div>
<div class="flower" style="left: 70%; animation-duration: 18s;"></div>
<div class="flower" style="left: 90%; animation-duration: 14s;"></div>

</body>
</html>
