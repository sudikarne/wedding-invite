<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation - Sudishna & Vikash</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
<style>
  body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    overflow: hidden;
    font-family: 'Playfair Display', serif;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #ff8c00; /* dark orange text */
  }

  .slide1 {
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100%;
    width: 100%;
    text-align: center;
    background: url('background-1.jpg') no-repeat center center/cover;
  }

  h1 {
    font-family: 'Great Vibes', cursive;
    font-size: 2em; /* reduced font size */
    margin: 0.2em 0;
    z-index: 2;
    position: relative; /* ensures text is above petals */
    letter-spacing: 1.5px;
  }

  /* Petals */
  .petal {
    position: absolute;
    width: 50px;
    height: 50px;
    background-image: url('https://i.ibb.co/k9LfBwp/pink-flower.png');
    background-size: cover;
    top: -10%;
    opacity: 0.8; /* slightly transparent */
    z-index: 1; /* below text but above background */
    animation-name: fall;
    animation-timing-function: linear;
    animation-iteration-count: infinite;
  }

  @keyframes fall {
    0% {
      transform: translateY(0) translateX(0) rotate(0deg);
      opacity: 1;
    }
    100% {
      transform: translateY(110vh) translateX(50px) rotate(360deg);
      opacity: 0;
    }
  }
</style>
</head>
<body>

<div class="slide1">
  <h1>Wedding Invitation</h1>
  <h1>Sudishna</h1>
  <h1>Vikash</h1>

  <!-- Petals -->
  <div class="petal" style="left: 5%; animation-duration: 12s;"></div>
  <div class="petal" style="left: 20%; animation-duration: 14s;"></div>
  <div class="petal" style="left: 35%; animation-duration: 10s;"></div>
  <div class="petal" style="left: 50%; animation-duration: 16s;"></div>
  <div class="petal" style="left: 65%; animation-duration: 12s;"></div>
  <div class="petal" style="left: 80%; animation-duration: 18s;"></div>
  <div class="petal" style="left: 90%; animation-duration: 15s;"></div>
</div>

</body>
</html>
