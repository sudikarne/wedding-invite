<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation - Sudishna & Vikash</title>
<!-- Elegant Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
<style>
  /* Full-page container */
  body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    overflow: hidden;
    font-family: 'Playfair Display', serif;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #f7c8d1; /* pastel pink text */
  }

  /* Slide1 with background image */
  .slide1 {
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    height: 100%;
    width: 100%;
    background: url('background-1.jpg') no-repeat center center/cover;
  }

  h1 {
    font-family: 'Great Vibes', cursive;
    font-size: 3em;
    text-align: center;
    z-index: 2;
    margin: 0;
    letter-spacing: 2px;
  }

  /* Petals animation */
  .petal {
    position: fixed;
    top: -50px;
    font-size: 20px;
    animation: fall linear infinite;
    opacity: 0.7;
  }

  @keyframes fall {
    0% {
      transform: translateY(0) translateX(0) rotate(0deg);
      opacity: 1;
    }
    100% {
      transform: translateY(110vh) translateX(50px) rotate(360deg);
      opacity: 0;
    }
  }

</style>
</head>
<body>

<div class="slide1">
  <h1>Wedding Invitation of<br>Sudishna & Vikash</h1>

  <!-- Petals -->
  <div class="petal" style="left: 5%; animation-duration: 12s;"></div>
  <div class="petal" style="left: 20%; animation-duration: 14s;"></div>
  <div class="petal" style="left: 35%; animation-duration: 10s;"></div>
  <div class="petal" style="left: 50%; animation-duration: 16s;"></div>
  <div class="petal" style="left: 65%; animation-duration: 12s;"></div>
  <div class="petal" style="left: 80%; animation-duration: 18s;"></div>
  <div class="petal" style="left: 90%; animation-duration: 15s;"></div>
</div>

</body>
</html>
